@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap');

.fk-root {
  min-height:100vh; color:var(--linen);
  background:
    radial-gradient(1200px 560px at 50% -180px, var(--glow), transparent 60%),
    radial-gradient(900px 620px at 112% 8%, rgba(122,150,220,.10), transparent 58%),
    radial-gradient(820px 560px at 106% 106%, rgba(90,196,201,.09), transparent 56%),
    radial-gradient(760px 560px at -10% 92%, rgba(167,139,219,.09), transparent 56%),
    radial-gradient(700px 520px at -8% 22%, rgba(227,154,140,.05), transparent 55%),
    linear-gradient(168deg, #12213a 0%, var(--pine) 46%, #0c1626 100%);
  background-attachment:fixed;
  font-family:'Nunito', ui-sans-serif, system-ui, sans-serif;
  font-size:16px; line-height:1.65;
  -webkit-font-smoothing:antialiased;
}
.fk-root * { box-sizing:border-box; }
.fk-wrap { max-width:640px; margin:0 auto; padding:44px 22px 44px; position:relative; z-index:1; }
.fk-display { font-family:'Quicksand', 'Nunito', sans-serif; font-weight:600; letter-spacing:-0.01em; }
.fk-h1 { font-size:clamp(28px,6vw,38px); line-height:1.18; margin:0; font-weight:700; }
.fk-h2 { font-size:23px; line-height:1.28; margin:0 0 6px; }
.fk-eyebrow { font-size:11.5px; letter-spacing:0.18em; text-transform:uppercase; color:var(--lantern); font-weight:800; font-family:'Nunito',sans-serif; }
.fk-sub { color:var(--sage); margin:8px 0 0; }
.fk-card { background:var(--moss); border:none; border-radius:28px; padding:26px 24px; margin-top:20px; box-shadow:0 14px 50px rgba(0,0,0,.28); }
.fk-quiet { color:var(--sage); font-size:14.5px; }
.fk-tiny { color:var(--sage-dim); font-size:13px; line-height:1.6; }
.fk-btn {
  font-family:'Quicksand',sans-serif; font-weight:700; font-size:15.5px;
  background:var(--lantern); color:#2b1f0b; border:none; border-radius:999px;
  padding:13px 26px; cursor:pointer; transition:transform .12s ease, filter .12s ease, box-shadow .2s;
  box-shadow:0 4px 22px var(--glow);
}
.fk-btn:hover { filter:brightness(1.06); box-shadow:0 6px 30px var(--glow); }
.fk-btn:active { transform:scale(.97); }
.fk-btn:disabled { background:var(--fern); color:var(--sage-dim); cursor:not-allowed; box-shadow:none; }
.fk-btn:focus-visible, .fk-ghost:focus-visible, .fk-choice:focus-visible, .fk-input:focus-visible, .fk-textarea:focus-visible, .fk-back:focus-visible, .fk-chip:focus-visible, .fk-check:focus-visible, .fk-tile:focus-visible, .fk-dot:focus-visible, .fk-die:focus-visible {
  outline:2px solid var(--lantern); outline-offset:3px;
}
.fk-ghost {
  font-family:'Nunito',sans-serif; font-weight:700; font-size:14.5px;
  background:var(--fern-soft); color:var(--sage); border:none;
  border-radius:999px; padding:12px 20px; cursor:pointer; transition:color .12s, filter .12s;
}
.fk-ghost:hover { color:var(--linen); filter:brightness(1.12); }
.fk-ghost:disabled { color:var(--sage-dim); cursor:not-allowed; filter:none; }
.fk-choice {
  display:block; width:100%; text-align:left; font-family:'Nunito',sans-serif;
  background:var(--fern-soft); color:var(--linen); border:none;
  border-radius:20px; padding:15px 18px; margin-top:10px; cursor:pointer;
  font-size:15.5px; font-weight:700; transition:filter .12s, transform .12s;
}
.fk-choice:hover { filter:brightness(1.12); transform:translateY(-1px); }
.fk-choice small { display:block; font-weight:400; color:var(--sage); font-size:13.5px; margin-top:2px; }
.fk-input, .fk-textarea {
  width:100%; background:var(--pine); border:1.5px solid var(--fern-soft); border-radius:18px;
  color:var(--linen); padding:13px 16px; font-size:15.5px; font-family:'Nunito',sans-serif;
}
.fk-input:focus, .fk-textarea:focus { border-color:var(--lantern-dim); }
.fk-textarea { font-size:16px; line-height:1.7; min-height:130px; resize:vertical; border-radius:20px; }
.fk-input::placeholder, .fk-textarea::placeholder { color:var(--sage-dim); }
.fk-label { display:block; font-size:12.5px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase; color:var(--sage); margin:16px 0 6px; font-family:'Nunito',sans-serif; }
.fk-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.fk-back { background:none; border:none; color:var(--sage); font-family:'Nunito',sans-serif; font-size:14px; font-weight:700; cursor:pointer; padding:6px 0; }
.fk-back:hover { color:var(--linen); }
.fk-divider { border:none; border-top:1px solid var(--fern-soft); margin:20px 0; }
.fk-science { background:var(--fern-soft); border-radius:20px; padding:16px 18px; margin-top:22px; }
.fk-pill { display:inline-block; font-size:11px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; border-radius:99px; padding:4px 11px; background:var(--fern-soft); color:var(--sage); }
.fk-list-item { width:100%; text-align:left; background:var(--moss); border:none; border-radius:22px; padding:15px 18px; margin-top:10px; cursor:pointer; color:var(--linen); font-family:'Nunito',sans-serif; transition:filter .12s, transform .12s; box-shadow:0 6px 24px rgba(0,0,0,.18); }
.fk-list-item:hover { filter:brightness(1.08); transform:translateY(-1px); }
@keyframes fk-rise { from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }
.fk-rise { animation:fk-rise .4s ease both; }
@keyframes fk-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.fk-bob { animation:fk-bob 3.4s ease-in-out infinite; display:inline-block; }

/* Celebrate screen: normal flex flow throughout (no absolute pixel offsets),
   so nothing can overlap regardless of card/content length. The firefly's
   own idle bob (.fk-bob, above) already provides continuous gentle motion
   for as long as this screen is mounted; only the one-shot entrance below
   is new. Nothing here depends on an animation completing to become
   visible, so it degrades safely under reduced motion (see media query). */
.fk-cel-stage { display:flex; flex-direction:column; align-items:center; padding:26px 4px 8px; text-align:center; }
.fk-cel-firefly-wrap { position:relative; width:170px; height:170px; display:flex; align-items:center; justify-content:center; }
.fk-cel-halo { position:absolute; left:50%; top:50%; width:260px; height:260px; margin:-130px 0 0 -130px; border-radius:50%; background:radial-gradient(circle, var(--glow) 0%, rgba(242,183,92,0) 68%); pointer-events:none; z-index:0; animation:fk-cel-halo-bloom 1.4s ease-out both; }
@keyframes fk-cel-halo-bloom { from{opacity:0; transform:scale(.6)} to{opacity:1; transform:scale(1)} }
.fk-cel-firefly { display:inline-block; position:relative; z-index:1; animation:fk-cel-arrive 1.8s cubic-bezier(.25,.8,.3,1) both; }
@keyframes fk-cel-arrive { 0%{transform:translateY(-120px) scale(.55)} 70%{transform:translateY(6px) scale(1.05)} 100%{transform:translateY(0) scale(1)} }
.fk-cel-headline { font-size:19px; margin:14px 0 0; color:var(--linen); }
.fk-cel-chips { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-top:16px; padding:0 8px; }
.fk-cel-chip { font-family:'Nunito',sans-serif; font-size:12.5px; font-weight:700; border-radius:99px; padding:6px 12px; }
.fk-cel-chip-chosen { color:#412402; background:var(--lantern); }
.fk-cel-chip-losing { color:var(--sage); background:var(--fern-soft); border:1px solid var(--fern); animation:fk-cel-chip-drift 3s ease-in-out both; }
@keyframes fk-cel-chip-drift { 0%{opacity:0; transform:translateY(8px) scale(.9)} 18%{opacity:1; transform:translateY(0) scale(1)} 60%{opacity:1; transform:translateY(0) scale(1)} 100%{opacity:0; transform:translate(var(--dx,0px),var(--dy,-24px)) scale(.6)} }

h.gov/11045774/",blurb:"Turning a swirl of half-formed thoughts into one coherent story is what brings clarity. Wisp mirrors the structure back; it never adds a conclusion."}]},{group:"Stress-testing a lean you already have",items:[{mode:"Gut check",cite:"Suzy Welch, 10-10-10 (2009), book",url:"https://www.suzywelch.com/books",blurb:"Ask how a choice will feel in 10 minutes, 10 months, and 10 years. Shifting the time horizon quietens short-term panic and surfaces what lasts."},{mode:"Gut check",cite:"Kross & Grossmann, JEP: General (2012)",url:"https://pubmed.ncbi.nlm.nih.gov/21707182/",blurb:"We reason more wisely about others than ourselves. Asking what you'd tell a friend in your situation borrows that clearer view."},{mode:"Gut check",cite:"Bechara et al., Science (1997)",url:"https://pubmed.ncbi.nlm.nih.gov/9036851/",blurb:"The body often registers a good or bad choice before conscious reasoning catches up. A deliberate body-check gives that signal room to be heard."}]},{group:"Weighing structured trade-offs",items:[{mode:"Analyze, weigh it",cite:"Franklin's 'moral algebra' letter (1772)",url:"https://founders.archives.gov/documents/Franklin/01-19-02-0200",blurb:"Franklin's pros-and-cons list had a twist we forget: weight each item by importance, then cancel equal ones. Weighting is what stops a list from just flattering the side you already like."},{mode:"Analyze, weigh it",cite:"Lord, Lepper & Preston, JPSP (1984)",url:"https://pubmed.ncbi.nlm.nih.gov/6520704/",blurb:"Deliberately arguing the opposite case is one of the few reliable ways to cut bias. Wisp asks you to make the honest case for the side you like less."},{mode:"Analyze",cite:"Nutt, Academy of Management Executive (1999)",url:"https://www.jstor.org/stable/4165585",blurb:"Half of organisational decisions fail, and 'whether or not' framings fail most. Adding even one more real option improves the odds, so Analyze nudges you to widen the frame first."}]},{group:"When there are too many options",items:[{mode:"Good enough",cite:"Simon, Psychological Review (1956)",url:"https://pubmed.ncbi.nlm.nih.gov/13310704/",blurb:"'Satisficing', setting a good-enough bar and taking the first option that clears it, is often smarter than exhaustively optimising."},{mode:"Good enough",cite:"Schwartz et al., JPSP (2002)",url:"https://pubmed.ncbi.nlm.nih.gov/12416921/",blurb:"People who try to find the very best option tend to end up less satisfied than those who settle for good enough. Maximising has a hidden cost."},{mode:"Good enough",cite:"Iyengar & Lepper, JPSP (2000)",url:"https://pubmed.ncbi.nlm.nih.gov/11138768/",blurb:"Too many choices can freeze us and dampen satisfaction. Narrowing the field on purpose is a feature, not a compromise."}]},{group:"Sitting with it, and deciding when to decide",items:[{mode:"Mull",cite:"Klein, Harvard Business Review (2007)",url:"https://hbr.org/2007/09/performing-a-project-premortem",blurb:"A 'pre-mortem', imagining the choice has already failed and asking why, surfaces roughly a third more risks than ordinary caution."},{mode:"Mull, wait",cite:"Partnoy, Wait (2012), book",url:"https://en.wikipedia.org/wiki/Wait:_The_Art_and_Science_of_Delay",blurb:"Delaying a decision on purpose, until the last responsible moment, often improves it. Waiting is a real choice when it has an edge."},{mode:"Mull, wait",cite:"Heath & Heath, Decisive (2013), book",url:"https://en.wikipedia.org/wiki/Decisive_(book)",blurb:"A 'tripwire', a date or event that will prompt you to act, keeps deliberate waiting from sliding into endless drift."}]}],$t=[{id:"flip",name:"Flip or roll",group:"decide",color:"#f2b75c",when:"Either way is fine; let a coin or wheel reveal what you were rooting for"},{id:"good",name:"Good enough",group:"decide",color:"#7fc08a",when:"Too many decent options; set a bar and stop searching"},{id:"gut",name:"Gut check",group:"test",color:"#ef8b6f",when:"I have a lean and want to test it, in three minutes, urgent or not"},{id:"surface",name:"Surfac
