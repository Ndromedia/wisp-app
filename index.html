@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap');

.fk-root {
  min-height:100vh; color:var(--linen);
  background:
    radial-gradient(1200px 560px at 50% -180px, var(--glow), transparent 60%),
    radial-gradient(900px 620px at 112% 8%, rgba(122,150,220,.10), transparent 58%),
    radial-gradient(820px 560px at 106% 106%, rgba(90,196,201,.09), transparent 56%),
    radial-gradient(760px 560px at -10% 92%, rgba(167,139,219,.09), transparent 56%),
    radial-gradient(700px 520px at -8% 22%, rgba(227,154,140,.05), transparent 55%),
    linear-gradient(168deg, #12213a 0%, var(--pine) 46%, #0c1626 100%);
  background-attachment:fixed;
  font-family:'Nunito', ui-sans-serif, system-ui, sans-serif;
  font-size:16px; line-height:1.65;
  -webkit-font-smoothing:antialiased;
}
.fk-root * { box-sizing:border-box; }
.fk-wrap { max-width:640px; margin:0 auto; padding:44px 22px 44px; position:relative; z-index:1; }
.fk-display { font-family:'Quicksand', 'Nunito', sans-serif; font-weight:600; letter-spacing:-0.01em; }
.fk-h1 { font-size:clamp(28px,6vw,38px); line-height:1.18; margin:0; font-weight:700; }
.fk-h2 { font-size:23px; line-height:1.28; margin:0 0 6px; }
.fk-eyebrow { font-size:11.5px; letter-spacing:0.18em; text-transform:uppercase; color:var(--lantern); font-weight:800; font-family:'Nunito',sans-serif; }
.fk-sub { color:var(--sage); margin:8px 0 0; }
.fk-card { background:var(--moss); border:none; border-radius:28px; padding:26px 24px; margin-top:20px; box-shadow:0 14px 50px rgba(0,0,0,.28); }
.fk-quiet { color:var(--sage); font-size:14.5px; }
.fk-tiny { color:var(--sage-dim); font-size:13px; line-height:1.6; }
.fk-btn {
  font-family:'Quicksand',sans-serif; font-weight:700; font-size:15.5px;
  background:var(--lantern); color:#2b1f0b; border:none; border-radius:999px;
  padding:13px 26px; cursor:pointer; transition:transform .12s ease, filter .12s ease, box-shadow .2s;
  box-shadow:0 4px 22px var(--glow);
}
.fk-btn:hover { filter:brightness(1.06); box-shadow:0 6px 30px var(--glow); }
.fk-btn:active { transform:scale(.97); }
.fk-btn:disabled { background:var(--fern); color:var(--sage-dim); cursor:not-allowed; box-shadow:none; }
.fk-btn:focus-visible, .fk-ghost:focus-visible, .fk-choice:focus-visible, .fk-input:focus-visible, .fk-textarea:focus-visible, .fk-back:focus-visible, .fk-chip:focus-visible, .fk-check:focus-visible, .fk-tile:focus-visible, .fk-dot:focus-visible, .fk-die:focus-visible {
  outline:2px solid var(--lantern); outline-offset:3px;
}
.fk-ghost {
  font-family:'Nunito',sans-serif; font-weight:700; font-size:14.5px;
  background:var(--fern-soft); color:var(--sage); border:none;
  border-radius:999px; padding:12px 20px; cursor:pointer; transition:color .12s, filter .12s;
}
.fk-ghost:hover { color:var(--linen); filter:brightness(1.12); }
.fk-ghost:disabled { color:var(--sage-dim); cursor:not-allowed; filter:none; }
.fk-choice {
  display:block; width:100%; text-align:left; font-family:'Nunito',sans-serif;
  background:var(--fern-soft); color:var(--linen); border:none;
  border-radius:20px; padding:15px 18px; margin-top:10px; cursor:pointer;
  font-size:15.5px; font-weight:700; transition:filter .12s, transform .12s;
}
.fk-choice:hover { filter:brightness(1.12); transform:translateY(-1px); }
.fk-choice small { display:block; font-weight:400; color:var(--sage); font-size:13.5px; margin-top:2px; }
.fk-input, .fk-textarea {
  width:100%; background:var(--pine); border:1.5px solid var(--fern-soft); border-radius:18px;
  color:var(--linen); padding:13px 16px; font-size:15.5px; font-family:'Nunito',sans-serif;
}
.fk-input:focus, .fk-textarea:focus { border-color:var(--lantern-dim); }
.fk-textarea { font-size:16px; line-height:1.7; min-height:130px; resize:vertical; border-radius:20px; }
.fk-input::placeholder, .fk-textarea::placeholder { color:var(--sage-dim); }
.fk-label { display:block; font-size:12.5px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase; color:var(--sage); margin:16px 0 6px; font-family:'Nunito',sans-serif; }
.fk-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.fk-back { background:none; border:none; color:var(--sage); font-family:'Nunito',sans-serif; font-size:14px; font-weight:700; cursor:pointer; padding:6px 0; }
.fk-back:hover { color:var(--linen); }
.fk-divider { border:none; border-top:1px solid var(--fern-soft); margin:20px 0; }
.fk-science { background:var(--fern-soft); border-radius:20px; padding:16px 18px; margin-top:22px; }
.fk-pill { display:inline-block; font-size:11px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; border-radius:99px; padding:4px 11px; background:var(--fern-soft); color:var(--sage); }
.fk-list-item { width:100%; text-align:left; background:var(--moss); border:none; border-radius:22px; padding:15px 18px; margin-top:10px; cursor:pointer; color:var(--linen); font-family:'Nunito',sans-serif; transition:filter .12s, transform .12s; box-shadow:0 6px 24px rgba(0,0,0,.18); }
.fk-list-item:hover { filter:brightness(1.08); transform:translateY(-1px); }
@keyframes fk-rise { from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }
.fk-rise { animation:fk-rise .4s ease both; }
@keyframes fk-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.fk-bob { animation:fk-bob 3.4s ease-in-out infinite; display:inline-block; }
@keyframes fk-toast { 0%{opacity:0; transform:translate(-50%,14px)} 12%{opacity:1; transform:translate(-50%,0)} 88%{opacity:1} 100%{opacity:0; transform:translate(-50%,6px)} }
.fk-toast {
  position:fixed; left:50%; bottom:26px; transform:translateX(-50%);
  background:var(--moss); color:var(--linen);
  border-radius:99px; padding:11px 22px 11px 13px; font-size:14.5px; font-weight:700;
  display:flex; align-items:center; gap:10px; box-shadow:0 10px 44px rgba(0,0,0,.45);
  animation:fk-toast 3s ease both; z-index:50; max-width:92vw; font-family:'Nunito',sans-serif;
}
@keyframes fk-pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
.fk-thinking { animation:fk-pulse 1.4s ease-in-out infinite; }
@keyframes fk-coinflip { 0%{transform:rotateX(0) scale(1)} 45%{transform:rotateX(1080deg) scale(1.12)} 100%{transform:rotateX(2160deg) scale(1)} }
.fk-die { display:inline-block; cursor:pointer; -webkit-tap-highlight-color:transparent; border:none; background:none; padding:0; }
.fk-die.flipping svg { animation:fk-coinflip 2.9s cubic-bezier(.28,.7,.22,1) both; }
.fk-die:hover svg { filter:brightness(1.05); }
.fk-slider { width:100%; accent-color:var(--lantern); }
.fk-bar-track { background:var(--fern-soft); border-radius:99px; height:12px; overflow:hidden; margin-top:6px; }
.fk-bar-fill { height:100%; border-radius:99px; background:var(--lantern); transition:width .5s ease; }
.fk-th { font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--sage-dim); font-weight:800; }
.fk-check { display:flex; gap:10px; align-items:flex-start; width:100%; text-align:left; background:var(--fern-soft); border:1.5px solid transparent; border-radius:18px; padding:13px 15px; margin-top:8px; cursor:pointer; color:var(--linen); font-family:'Nunito',sans-serif; font-size:15px; font-weight:700; }
.fk-check.on { border-color:var(--lantern); background:var(--glow); }
.fk-chip {
  font-family:'Nunito',sans-serif; font-weight:700; font-size:14px;
  background:var(--fern-soft); color:var(--linen); border:1.5px solid transparent;
  border-radius:999px; padding:9px 16px; cursor:pointer; transition:border-color .12s, background .12s;
}
.fk-chip.on { border-color:var(--lantern); background:var(--glow); }
.fk-opt-chip { display:inline-flex; align-items:center; gap:6px; background:var(--fern-soft); color:var(--linen); border-radius:999px; padding:7px 8px 7px 14px; font-size:14px; font-weight:700; margin:6px 6px 0 0; }
.fk-opt-chip button { background:none; border:none; color:var(--sage-dim); cursor:pointer; font-size:13px; padding:0 4px; }
.fk-opt-chip button:hover { color:var(--rose); }
.fk-footer { text-align:center; margin-top:44px; }
.fk-modal-scrim { position:fixed; inset:0; background:rgba(0,0,0,.55); backdrop-filter:blur(2px); display:flex; align-items:flex-end; justify-content:center; z-index:60; padding:0; }
.fk-modal { background:var(--moss); border-radius:28px 28px 0 0; padding:24px 22px 32px; width:100%; max-width:640px; max-height:82vh; overflow-y:auto; box-shadow:0 -14px 50px rgba(0,0,0,.4); animation:fk-modal-up .3s ease both; }
@keyframes fk-modal-up { from { transform:translateY(24px); opacity:0; } to { transform:translateY(0); opacity:1; } }
@media (min-width:560px){ .fk-modal-scrim{ align-items:center; } .fk-modal{ border-radius:28px; } }
.fk-xdel { background:none; border:none; color:var(--sage-dim); cursor:pointer; font-size:13px; padding:4px 8px; font-family:'Nunito',sans-serif; }
.fk-xdel:hover { color:var(--rose); }
.fk-tilegrid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
.fk-tile {
  border:none; border-radius:24px; padding:18px 16px 16px; text-align:left; cursor:pointer;
  color:var(--linen); font-family:'Nunito',sans-serif; transition:transform .12s, filter .12s;
  box-shadow:0 6px 22px rgba(0,0,0,.16);
}
.fk-tile:hover { transform:translateY(-2px); filter:brightness(1.1); }
.fk-tile .em { font-size:26px; line-height:1; display:block; }
.fk-tile .nm { font-family:'Quicksand',sans-serif; font-weight:700; font-size:16px; margin-top:8px; display:block; }
.fk-tile .wn { color:var(--sage); font-size:12.5px; font-weight:400; line-height:1.45; margin-top:3px; display:block; }
@media (max-width:420px){ .fk-tilegrid{ grid-template-columns:1fr; } }
.fk-dot { width:26px; height:26px; border-radius:50%; border:2px solid var(--fern); background:transparent; cursor:pointer; padding:0; transition:all .12s; }
.fk-dot.on { background:var(--lantern); border-color:var(--lantern); box-shadow:0 0 10px var(--glow); }
.fk-select { background:var(--pine); color:var(--linen); border:1.5px solid var(--fern-soft); border-radius:14px; padding:9px 12px; font-family:'Nunito',sans-serif; font-size:14px; }
@media (prefers-reduced-motion: reduce) {
  .fk-rise, .fk-bob, .fk-toast, .fk-thinking, .fk-die.flipping svg { animation:none; }
  .fk-choice:hover, .fk-list-item:hover, .fk-tile:hover { transform:none; }
  .fk-wheel-rotor { transition:none !important; }
  .fk-demo-cursor { transition:none !important; }
}
.fk-phone { max-width:340px; margin:0 auto; background:var(--pine); border-radius:34px; padding:16px 14px 20px; box-shadow:0 20px 60px rgba(0,0,0,.4), inset 0 0 0 2px var(--fern-soft); position:relative; overflow:hidden; min-height:420px; }
.fk-phone-notch { width:96px; height:6px; border-radius:99px; background:var(--fern-soft); margin:0 auto 14px; }
.fk-caption { text-align:center; font-family:'Nunito',sans-serif; color:var(--sage); font-size:14.5px; min-height:42px; margin-top:14px; padding:0 8px; }
.fk-demo-cursor { position:absolute; width:20px; height:20px; pointer-events:none; z-index:5; transition:left .7s cubic-bezier(.5,0,.3,1), top .7s cubic-bezier(.5,0,.3,1); filter:drop-shadow(0 2px 3px rgba(0,0,0,.4)); }
@keyframes fk-tap { 0%,100%{transform:scale(1)} 50%{transform:scale(.8)} }
.fk-demo-cursor.tapping { animation:fk-tap .4s ease; }
.fk-scrub { flex:1; height:5px; border-radius:99px; background:var(--fern-soft); overflow:hidden; }
.fk-scrub-fill { height:100%; background:var(--lantern); border-radius:99px; }
.fk-topbar { display:flex; align-items:center; gap:10px; padding:2px 2px 14px; margin-bottom:2px; }
.fk-topbar-mark { background:none; border:none; padding:0; margin:0; cursor:pointer; font-family:'Quicksand',sans-serif; font-weight:700; font-size:16px; color:var(--linen); letter-spacing:.01em; display:flex; align-items:center; gap:7px; }
.fk-topbar-mark:hover { color:var(--lantern); }
.fk-topbar-back { background:none; border:none; color:var(--sage); font-family:'Nunito',sans-serif; font-size:14px; font-weight:700; cursor:pointer; padding:6px 8px 6px 0; }
.fk-topbar-back:hover { color:var(--linen); }
.fk-fadein { animation:fk-rise .5s ease both; }

36851/",blurb:"The body often registers a good or bad choice before conscious reasoning catches up. A deliberate body-check gives that signal room to be heard."}]},{group:"Weighing structured trade-offs",items:[{mode:"Analyze, weigh it",cite:"Franklin's 'moral algebra' letter (1772)",url:"https://founders.archives.gov/documents/Franklin/01-19-02-0200",blurb:"Franklin's pros-and-cons list had a twist we forget: weight each item by importance, then cancel equal ones. Weighting is what stops a list from just flattering the side you already like."},{mode:"Analyze, weigh it",cite:"Lord, Lepper & Preston, JPSP (1984)",url:"https://pubmed.ncbi.nlm.nih.gov/6520704/",blurb:"Deliberately arguing the opposite case is one of the few reliable ways to cut bias. Wisp asks you to make the honest case for the side you like less."},{mode:"Analyze",cite:"Nutt, Academy of Management Executive (1999)",url:"https://www.jstor.org/stable/4165585",blurb:"Half of organisational decisions fail, and 'whether or not' framings fail most. Adding even one more real option improves the odds, so Analyze nudges you to widen the frame first."}]},{group:"When there are too many options",items:[{mode:"Good enough",cite:"Simon, Psychological Review (1956)",url:"https://pubmed.ncbi.nlm.nih.gov/13310704/",blurb:"'Satisficing', setting a good-enough bar and taking the first option that clears it, is often smarter than exhaustively optimising."},{mode:"Good enough",cite:"Schwartz et al., JPSP (2002)",url:"https://pubmed.ncbi.nlm.nih.gov/12416921/",blurb:"People who try to find the very best option tend to end up less satisfied than those who settle for good enough. Maximising has a hidden cost."},{mode:"Good enough",cite:"Iyengar & Lepper, JPSP (2000)",url:"https://pubmed.ncbi.nlm.nih.gov/11138768/",blurb:"Too many choices can freeze us and dampen satisfaction. Narrowing the field on purpose is a feature, not a compromise."}]},{group:"Sitting with it, and deciding when to decide",items:[{mode:"Mull",cite:"Klein, Harvard Business Review (2007)",url:"https://hbr.org/2007/09/performing-a-project-premortem",blurb:"A 'pre-mortem', imagining the choice has already failed and asking why, surfaces roughly a third more risks than ordinary caution."},{mode:"Mull, wait",cite:"Partnoy, Wait (2012), book",url:"https://en.wikipedia.org/wiki/Wait:_The_Art_and_Science_of_Delay",blurb:"Delaying a decision on purpose, until the last responsible moment, often improves it. Waiting is a real choice when it has an edge."},{mode:"Mull, wait",cite:"Heath & Heath, Decisive (2013), book",url:"https://en.wikipedia.org/wiki/Decisive_(book)",blurb:"A 'tripwire', a date or event that will prompt you to act, keeps deliberate waiting from sliding into endless drift."}]}],Wt=[{id:"flip",name:"Flip or roll",group:"decide",color:"#f2b75c",when:"Either way is fine; let a coin or wheel reveal what you were rooting for"},{id:"good",name:"Good enough",group:"decide",color:"#7fc08a",when:"Too many decent options; set a bar and stop searching"},{id:"gut",name:"Gut check",group:"test",color:"#ef8b6f",when:"I have a lean and want to test it, in three minutes, urgent or not"},{id:"surface",name:"Surface",group:"clear",color:"#57c4cb",when:"My head is unclear; help me find what I think or feel first"},{id:"analyze",name:"Analyze",group:"test",color:"#6f9ff0",when:"Trade-offs to weigh; a pros/cons list or a multi-option comparison"},{id:"mull",name:"Mull",group:"time",color:"#b585e6",when:"Big and personal; sit with it over time, with a deadline if you need one"}],qh=[{id:"clear",label:"Clear your head",hint:"when you're not sure what you think yet"},{id:"test",label:"Test your thinking",hint:"when you have a lean to weigh or pressure-test"},{id:"time",label:"Take your time",hint:"when it's big and deserves more than one sitting"},{id:"decide",label:"Just decide",hint:"when it's time to stop deliberating"}],Fn={flip:"Flip or roll",surface:"Surface",distil:"Surface, distilled",gut:"Gut check",analyze:"Analyze",weig
